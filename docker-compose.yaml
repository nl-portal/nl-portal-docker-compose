services:
  # keycloak

  nl-portal-keycloak:
    container_name: nl-portal-keycloak
    depends_on:
      - nl-portal-keycloak-database
    image: keycloak/keycloak:24.0.5
    ports:
      - "8082:8080"
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KEYCLOAK_USER: user
      KEYCLOAK_PASSWORD: user
      DB_VENDOR: POSTGRES
      DB_DATABASE: keycloak
      DB_ADDR: nl-portal-keycloak-database
      DB_URL_PORT: 5445
      DB_USER: keycloak
      DB_PASSWORD: keycloak
    volumes:
      - ./imports/keycloak:/opt/keycloak/data/import
    command:
      - "start-dev"
      - "--import-realm"
      - "--http-relative-path"
      - "/auth"
      - "--features=token-exchange,admin-fine-grained-authz"

  nl-portal-keycloak-database:
    image: postgres:15
    platform: linux/arm64
    container_name: nl-portal-keycloak-database
    environment:
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak

  # nl portal database

  nl-portal-database:
    container_name: nl-portal-database
    image: postgres:15
    platform: linux/arm64
    ports:
      - "54321:5432"
    environment:
      POSTGRES_USER: nlportal
      POSTGRES_PASSWORD: password
      POSTGRES_DB: nl-portal
    volumes:
      - nl-portal-database-data:/var/lib/postgres # persist data even if container shuts down

  #zgw

  openzaak:
    image: openzaak/open-zaak:1.12.4
    platform: linux/amd64
    container_name: nl-portal-openzaak
    profiles:
      - zgw
      - openzaak
    environment:
      - DB_HOST=openzaak-database
      - DB_POST=5433
      - SECRET_KEY=veryRestrictedSecretKey
      - DB_USER=openzaak
      - DB_PASSWORD=openzaak
      - DB_NAME=openzaak
      - CACHE_DEFAULT=redis:6379/0
      - CACHE_AXES=redis:6379/0
      - DEBUG=true
      - ALLOWED_HOSTS=localhost,host.docker.internal,172.17.0.1,openzaak
      - OPENZAAK_SUPERUSER_USERNAME=admin
      - OPENZAAK_SUPERUSER_EMAIL=admin@admin.org
      - DJANGO_SUPERUSER_PASSWORD=admin
      - SENDFILE_BACKEND=django_sendfile.backends.simple
    ports:
      - "8001:8000"
    depends_on:
      - openzaak-database
      - redis

  openzaak-database:
    image: mdillon/postgis:11
    platform: linux/amd64
    container_name: nl-portal-openzaak-database
    profiles:
      - zgw
      - openzaak
    environment:
      - POSTGRES_USER=openzaak
      - POSTGRES_PASSWORD=openzaak
      - POSTGRES_DB=openzaak
    volumes:
      - ./imports/open-zaak:/docker-entrypoint-initdb.d

  openklant:
    image: maykinmedia/open-klant:2.0.0
    platform: linux/amd64
    container_name: nl-portal-openklant
    profiles:
      - zgw
      - openklant
    environment:
      - DB_HOST=openklant-database
      - SECRET_KEY=veryRestrictedSecretKey
      - DB_USER=openklant
      - DB_PASSWORD=openklant
      - DB_NAME=openklant
      - CACHE_DEFAULT=redis:6379/0
      - CACHE_AXES=redis:6379/0
      - ALLOWED_HOSTS=*
      - DJANGO_SETTINGS_MODULE=openklant.conf.docker
    ports:
      - "8006:8000"
    depends_on:
      - openklant-database
      - redis

  openklant-database:
    image: postgres:15
    platform: linux/arm64
    container_name: nl-portal-openklant-database
    profiles:
      - zgw
      - openklant
    environment:
      - POSTGRES_USER=openklant
      - POSTGRES_PASSWORD=openklant
      - POSTGRES_DB=openklant
    volumes:
      - ./imports/open-klant:/docker-entrypoint-initdb.d

  redis:
    image: redis:6.2.6
    container_name: nl-portal-redis
    profiles:
      - zgw
      - openklant

  objecten-api:
    image: maykinmedia/objects-api:2.3.2
    platform: linux/amd64
    container_name: nl-portal-objecten-api
    profiles:
      - zgw
      - objecten
    ports:
      - "8010:8000"
    environment: &objects-env
      - CORS_ALLOW_ALL_ORIGINS=true
      - SECRET_KEY=${SECRET_KEY:-1(@f(-6s_u(5fd&1sg^uvu2s(c-9sapw)1era8q&)g)h@cwxxg}
      - DJANGO_SETTINGS_MODULE=objects.conf.docker
      - DB_HOST=objecten-api-database
      - DEBUG=true
      - TWO_FACTOR_FORCE_OTP_ADMIN=False # this is not available yet in this version
      - TWO_FACTOR_PATCH_ADMIN=False
    depends_on:
      - objecten-api-database

  objecten-api-database:
    image: postgis/postgis:13-3.1
    platform: linux/amd64
    container_name: nl-portal-objecten-api-database
    profiles:
      - zgw
      - objecten
    environment:
      - POSTGRES_USER=objects
      - POSTGRES_PASSWORD=objects
      - POSTGRES_DB=objects

  objecten-api-import:
    image: maykinmedia/objects-api:2.3.2
    platform: linux/amd64
    container_name: nl-portal-objects-api-import
    restart: no
    profiles:
      - zgw
      - objecten
    environment: *objects-env
    # in the current version of django it is not possible to create a new user with password without user interaction by using the createsuperuser command
    command: sh init/init.sh
    volumes:
      - ./imports/objects-api/fixtures:/app/src/objects/fixtures
      - ./imports/objects-api/init:/app/init
    depends_on:
      - objecten-api

  objecttypen-api:
    image: maykinmedia/objecttypes-api:2.1.3
    platform: linux/amd64
    container_name: nl-portal-objecttypen-api
    profiles:
      - zgw
      - objecten
    ports:
      - "8011:8000"
    environment: &objecttypes-env
      - CORS_ALLOW_ALL_ORIGINS=true
      - SECRET_KEY=${SECRET_KEY:-fgv=c0hz&tl*8*3m3893@m+1pstrvidc9e^5@fpspmg%cy$$15d}
      - DJANGO_SETTINGS_MODULE=objecttypes.conf.docker
      - DB_HOST=objecttypen-api-database
      - DEBUG=true
      - TWO_FACTOR_FORCE_OTP_ADMIN=False # this is not available yet in this version
      - TWO_FACTOR_PATCH_ADMIN=False
    depends_on:
      - objecttypen-api-database

  objecttypen-api-database:
    image: postgres:15
    container_name: nl-portal-objecttypen-api-database
    platform: linux/arm64
    profiles:
      - zgw
      - objecten
    environment:
      - POSTGRES_USER=objecttypes
      - POSTGRES_PASSWORD=objecttypes
      - POSTGRES_DB=objecttypes


  objecttypen-api-import:
    image: maykinmedia/objecttypes-api:2.1.3
    platform: linux/amd64
    container_name: nl-portal-objecttypen-api-import
    restart: no
    profiles:
      - zgw
      - objecten
    environment: *objecttypes-env
    command: sh init/init.sh
    volumes:
      - ./imports/objecttypes-api/fixtures:/app/src/objecttypes/fixtures
      - ./imports/objecttypes-api/init:/app/init
    depends_on:
      - objecttypen-api


  # open notificaties
  open-notificaties-rabbitmq:
    image: rabbitmq:3.9-management
    container_name: nl-portal-open-notificaties-rabbitmq
    expose:
      - 5673
      - 15673
    ports:
      - "5673:5673"
      - "15673:15673"

  open-notificaties:
    image: openzaak/open-notificaties:1.6.0
    platform: linux/amd64
    container_name: nl-portal-open-notificaties
    ports:
      - "8002:8000"
    environment: &notificaties-env
      - DJANGO_SETTINGS_MODULE=nrc.conf.docker
      - SECRET_KEY=${SECRET_KEY:-4wHY2Cp5`4(q%)]cuWxPQJRp5kN?g+`.Xah>%6Fsq6+)R>p_}
      - ALLOWED_HOSTS=*
      - CACHE_DEFAULT=redis-open-notificaties:6379/0
      - CACHE_AXES=redis-open-notificaties:6379/1
      - DB_PORT=5432
      - DB_HOST=database-open-notificaties
      - DB_NAME=notifications
      - DB_USER=notifications
      - DB_PASSWORD=notifications
      - DEBUG=true
      - RABBITMQ_HOST=open-notificaties-rabbitmq
      - PUBLISH_BROKER_URL=redis://redis-open-notificaties:6379/0
      - CELERY_BROKER_URL=redis://redis-open-notificaties:6379/0
      - CELERY_RESULT_BACKEND=redis://redis-open-notificaties:6379/0
      - CELERY_LOGLEVEL=DEBUG
      - CELERY_WORKER_CONCURRENCY=${CELERY_WORKER_CONCURRENCY:-4}

  open-notificaties-celery:
    image: openzaak/open-notificaties:1.6.0
    platform: linux/amd64
    container_name: nl-portal-open-notificaties-celery
    environment: *notificaties-env
    command: /celery_worker.sh

  database-open-notificaties:
    image: postgres:15  # open-notificaties doesn't work with postgres 14. A: Source?
    platform: linux/arm64
    container_name: nl-portal-open-notificaties-database
    ports:
      - "54319:5432"
    environment:
      - POSTGRES_USER=${DB_USER:-notifications}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-notifications}
      - POSTGRES_DB=notifications
    volumes:
      - ./imports/open-notificaties:/docker-entrypoint-initdb.d

  redis-open-notificaties:
    image: redis:6.2.6
    container_name: nl-portal-redis-open-notificaties

volumes:
  nl-portal-database-data: